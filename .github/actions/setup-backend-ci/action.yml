name: Setup Backend CI
description: Install Rust toolchain, restore Cargo cache, and install Linux system dependencies.

inputs:
  install-clippy:
    description: Install the clippy component with the Rust toolchain.
    required: false
    default: "false"

runs:
  using: composite
  steps:
    - uses: dtolnay/rust-toolchain@stable
      if: ${{ inputs.install-clippy != 'true' }}

    - uses: dtolnay/rust-toolchain@stable
      if: ${{ inputs.install-clippy == 'true' }}
      with:
        components: clippy

    - uses: Swatinem/rust-cache@v2
      with:
        workspaces: packages/desktop/src-tauri -> target
        prefix-key: v2
        cache-on-failure: "true"

    - name: Install system deps
      shell: bash
      run: |
        sudo apt-get update -q
        sudo apt-get install -yq --no-install-recommends \
          libwebkit2gtk-4.1-dev librsvg2-dev \
          libgtk-3-dev libayatana-appindicator3-dev libasound2-dev patchelf