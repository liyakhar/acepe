name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_INCREMENTAL: 0
  CARGO_NET_RETRY: 10
  RUSTFLAGS: -D warnings
  RUST_BACKTRACE: short

jobs:
  # ── JS: lint + typecheck + test (all parallel inside one job) ───────
  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10
          cache: true
          cache-dependency-path: bun.lock

      - run: bun install --frozen-lockfile

      # Website svelte-check needs env vars declared in .env for $env/static/public types
      - run: cp packages/website/.env.example packages/website/.env

      - name: Generate frontend artifacts
        run: |
          cd packages/desktop
          bun run i18n:generate
          cd ../website
          bun run i18n:generate

      # All three run in parallel via background processes
      - name: Lint + Typecheck + Test
        run: |
          # Lint (desktop + website in parallel)
          (cd packages/desktop && bunx @biomejs/biome lint .) &
          LINT_DESKTOP=$!
          (cd packages/website && bunx @biomejs/biome lint .) &
          LINT_WEBSITE=$!

          # Typecheck desktop (tsgo)
          (cd packages/desktop && bun run check) &
          CHECK_DESKTOP=$!

          # Typecheck website (svelte-check)
          (cd packages/website && bun run check) &
          CHECK_WEBSITE=$!

          # Tests
          (cd packages/desktop && AGENT=1 bun test $(find src -type f \( -name '*.test.ts' -o -name '*.vitest.ts' \))) &
          TEST_DESKTOP=$!
          (cd packages/website && bun run test) &
          TEST_WEBSITE=$!

          # Wait and collect exit codes
          FAIL=0
          for PID in $LINT_DESKTOP $LINT_WEBSITE $CHECK_DESKTOP $CHECK_WEBSITE $TEST_DESKTOP $TEST_WEBSITE; do
            wait $PID || FAIL=1
          done
          exit $FAIL

  # ── Rust: check + clippy + test ─────────────────────────────────────
  backend:
    name: Backend
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: packages/desktop/src-tauri -> target
          prefix-key: v2
          cache-on-failure: "true"

      - name: Install system deps
        run: |
          sudo apt-get update -q
          sudo apt-get install -yq --no-install-recommends \
            libwebkit2gtk-4.1-dev librsvg2-dev \
            libgtk-3-dev libayatana-appindicator3-dev libasound2-dev patchelf

      - name: Clippy + Test
        working-directory: packages/desktop/src-tauri
        run: |
          set -o pipefail
          cargo clippy --all-targets --no-default-features -- -D warnings
          cargo test --no-default-features -- --skip claude_history::export_types
